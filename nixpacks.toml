# Nixpacks build configuration for Railway
# (Task 28 — revised) Project runs with npm, NOT bun.
#
# Problem: bun.lock was committed, so Nixpacks auto-detected Bun and ran
# `bun install --frozen-lockfile`. Bun version mismatch between local and
# Railway caused "lockfile had changes, but lockfile is frozen" error.
#
# Fix: explicitly use npm for the install phase. npm ci requires a
# committed package-lock.json (generated via `npm install`). bun.lock is
# gitignored so Nixpacks no longer auto-detects Bun.
#
# MySQL deployment: The build switches the Prisma schema to MySQL before
# generating the client, so the generated Prisma Client has @db.VarChar,
# @db.MediumText, etc. The DATABASE_URL env var on Railway must point to
# a MySQL database. The switch-db.sh script handles schema switching.

[phases.setup]
nixPkgs = ["nodejs_20"]

# Install phase: use npm ci for deterministic, fast installs.
# npm ci reads package-lock.json exclusively (does not mutate it).
[phases.install]
cmds = ["npm ci"]

# Build phase:
#   1. Switch Prisma schema to MySQL (for production client generation)
#   2. Generate Prisma Client
#   3. Build Next.js
# If DATABASE_URL is SQLite (local dev), the switch is skipped.
[phases.build]
cmds = [
  "bash scripts/switch-db.sh mysql",
  "npx prisma generate",
  "npm run build"
]

# Start phase: Push schema to MySQL, then start Next.js production server
# --accept-data-loss is safe because MySQL is the source of truth in prod
[start]
cmd = "npx prisma db push --accept-data-loss && npm run start"
