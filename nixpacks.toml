# Nixpacks build configuration for Railway
#
# The default schema.prisma is MySQL (for production).
# For local SQLite dev, run: cp prisma/schema.sqlite.prisma prisma/schema.prisma && bun run db:push

[phases.setup]
nixPkgs = ["nodejs_20"]

# Install phase: npm ci reads package-lock.json
[phases.install]
cmds = ["npm ci"]

# Build phase: Generate Prisma Client (MySQL) + Build Next.js
[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

# Start phase: Push schema to MySQL, then start Next.js
[start]
cmd = "npx prisma db push --accept-data-loss && npx next start"
