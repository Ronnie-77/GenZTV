# Nixpacks build configuration for Railway
#
# The default schema.prisma is MySQL (for production).
# For local SQLite dev, run: cp prisma/schema.sqlite.prisma prisma/schema.prisma && bun run db:push

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build",
  "cp -r prisma .next/standalone/prisma",
  "cp -r node_modules/.prisma .next/standalone/node_modules/.prisma"
]

# Start: push schema then start server
# Using ";" not "&&" so server starts even if prisma db push fails
[start]
cmd = "npx prisma db push --accept-data-loss; node .next/standalone/server.js"
