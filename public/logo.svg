<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0D0D12"/>
  <!-- Antenna left -->
  <line x1="178" y1="56" x2="256" y2="136" stroke="#F5F5F7" stroke-width="10" stroke-linecap="round"/>
  <!-- Antenna right -->
  <line x1="334" y1="56" x2="256" y2="136" stroke="#F5F5F7" stroke-width="10" stroke-linecap="round"/>
  <!-- Antenna dots -->
  <circle cx="178" cy="56" r="8" fill="#7C8CF8"/>
  <circle cx="334" cy="56" r="8" fill="#E0636A"/>
  <!-- TV Body -->
  <rect x="72" y="136" width="368" height="280" rx="32" fill="#1A1A24" stroke="#F5F5F7" stroke-width="6"/>
  <!-- Screen -->
  <rect x="100" y="164" width="312" height="200" rx="16" fill="#252530"/>
  <!-- Play button -->
  <polygon points="226,244 226,284 262,264" fill="#F5F5F7"/>
  <!-- Legs -->
  <rect x="160" y="416" width="12" height="48" rx="6" fill="#F5F5F7"/>
  <rect x="340" y="416" width="12" height="48" rx="6" fill="#F5F5F7"/>
  <!-- Knobs -->
  <circle cx="160" cy="392" r="10" fill="#7C8CF8"/>
  <circle cx="352" cy="392" r="10" fill="#E0636A"/>
  <!-- LIVE badge -->
  <rect x="200" y="386" width="112" height="24" rx="12" fill="#FF3B30"/>
  <text x="256" y="403" text-anchor="middle" fill="white" font-size="14" font-weight="800" font-family="sans-serif">LIVE</text>
</svg>
